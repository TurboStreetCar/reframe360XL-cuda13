name: Build Reframe360XL (Linux)

on: 
  workflow_dispatch: # This adds the "Run workflow" button in the Actions tab
  push:
    branches: [ "main" ] # Or "master"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CUDA 13.2
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '13.2.0'
          method: 'network'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ocl-icd-opencl-dev opencl-headers libglm-dev

      - name: Download OpenFX SDK
        run: |
          git clone https://github.com/AcademySoftwareFoundation/openfx openfx-sdk

      - name: Compile with Makefile
        run: |
          # 1. Set the path to the CUDA 13 toolkit provided by the runner
          export CUDAPATH=$CUDA_PATH
          
          # 2. Tell the Makefile exactly where we just downloaded the OpenFX headers
          export BMDOFXDEVPATH=$GITHUB_WORKSPACE/openfx-sdk
          
          # 3. Clean and build
          make clean
          make

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reframe360XL-Linux
          path: Reframe360XL.so
